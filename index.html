<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GitHub Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 50px;
    }

    .card {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
    }

    p {
      color: #666;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #24292e;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    a:hover {
      background: #000;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Hello, GitHub Pages!</h1>
    <p>This is my first website hosted on GitHub.</p>

    <a href="https://github.com/" target="_blank">
      Visit GitHub
    </a>
  </div>

</body>
</html>
